<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT-OPS // Triage Console</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg:#090c10;
            --panel:#10151c;
            --panel-alt:#141a22;
            --border:#212a35;
            --border-soft:#1a212b;
            --text:#e7ecf2;
            --muted:#71808f;
            --signal:#33d6c0;
            --warning:#ffb020;
            --critical:#ff5a5f;
            --ok:#4ade80;
        }
        html,body{background:var(--bg);}
        body{font-family:'Inter',sans-serif;}
        .mono{font-family:'JetBrains Mono',monospace;}

        /* scanline texture */
        .scan-bg{
            background-image:
                radial-gradient(circle at 15% 10%, rgba(51,214,192,0.06), transparent 40%),
                radial-gradient(circle at 85% 90%, rgba(255,90,95,0.05), transparent 40%),
                repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
        }

        .cursor-blink{ animation: blink 1.1s steps(1) infinite; }
        @keyframes blink{ 50%{ opacity:0; } }

        .pulse-line{ stroke-dasharray: 1400; stroke-dashoffset: 1400; animation: draw 3.2s linear infinite; }
        @keyframes draw{
            0%{ stroke-dashoffset: 1400; }
            50%{ stroke-dashoffset: 0; }
            100%{ stroke-dashoffset: -1400; }
        }

        .dot-live{ box-shadow: 0 0 0 0 rgba(51,214,192,0.55); animation: dotpulse 1.8s infinite; }
        @keyframes dotpulse{
            0%{ box-shadow: 0 0 0 0 rgba(51,214,192,0.55); }
            70%{ box-shadow: 0 0 0 8px rgba(51,214,192,0); }
            100%{ box-shadow: 0 0 0 0 rgba(51,214,192,0); }
        }

        .ticket-card{ transition: border-color .18s ease, transform .18s ease, background .18s ease; }
        .ticket-card:hover{ border-color: var(--signal); transform: translateX(2px); background: var(--panel-alt); }

        input:focus, textarea:focus, select:focus{ outline:none; border-color: var(--signal) !important; box-shadow: 0 0 0 3px rgba(51,214,192,0.12); }

        ::-webkit-scrollbar{ width:8px; }
        ::-webkit-scrollbar-track{ background: transparent; }
        ::-webkit-scrollbar-thumb{ background: #232b36; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover{ background: #2c3644; }

        .priority-High{ border-left-color: var(--critical) !important; }
        .priority-Medium{ border-left-color: var(--warning) !important; }
        .priority-Low{ border-left-color: var(--ok) !important; }

        .badge{ font-family:'JetBrains Mono',monospace; letter-spacing:.02em; }

        .btn-primary{ background: var(--signal); color:#04211d; }
        .btn-primary:hover{ background:#4fe6d1; }
        .btn-primary:disabled{ background:#22303a; color:#5c6b78; }

        @media (prefers-reduced-motion: reduce){
            .cursor-blink, .pulse-line, .dot-live{ animation: none !important; }
        }
    </style>
</head>
<body class="scan-bg text-slate-100 min-h-screen">

    <div class="max-w-7xl mx-auto px-5 py-8">

        <!-- Top status bar -->
        <div class="mono text-xs text-[var(--muted)] flex items-center justify-between border-b border-[var(--border-soft)] pb-3 mb-6">
            <span>SYS://it-ops-triage &nbsp;|&nbsp; region: id-jkt-1 &nbsp;|&nbsp; uptime: 99.98%</span>
            <span class="flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-[var(--signal)] dot-live"></span>
                LIVE
            </span>
        </div>

        <!-- Header -->
        <header class="flex flex-wrap justify-between items-end gap-4 mb-8">
            <div>
                <h1 class="mono text-2xl md:text-3xl font-bold text-white tracking-tight">
                    triage-console<span class="text-[var(--signal)]">_</span><span class="cursor-blink text-[var(--signal)]">|</span>
                </h1>
                <p class="text-[var(--muted)] mt-2 text-sm">Sistem antrean & analisis prioritas untuk kendala IT internal.</p>
            </div>
            <button onclick="fetchTickets()" class="mono text-xs uppercase tracking-wider border border-[var(--border)] hover:border-[var(--signal)] hover:text-[var(--signal)] text-slate-300 px-4 py-2.5 rounded-md transition-all cursor-pointer">
                ↻ refresh
            </button>
        </header>

        <!-- Pulse strip (signature element) -->
        <div class="border border-[var(--border)] bg-[var(--panel)] rounded-xl mb-8 px-5 py-4 overflow-hidden">
            <svg viewBox="0 0 700 60" class="w-full h-10" preserveAspectRatio="none">
                <polyline class="pulse-line" fill="none" stroke="#33d6c0" stroke-width="1.6"
                    points="0,30 60,30 80,10 100,50 120,30 220,30 240,8 260,52 280,30 400,30 420,14 440,46 460,30 700,30" />
            </svg>
        </div>

        <!-- Main Content Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

            <!-- Left Column: Form -->
            <div class="bg-[var(--panel)] border border-[var(--border)] rounded-xl p-6 h-fit">
                <h2 class="mono text-sm uppercase tracking-wider text-[var(--signal)] mb-5">
                    &gt; laporkan_kendala
                </h2>
                <form id="ticketForm" class="space-y-4">
                    <div>
                        <label class="mono block text-[11px] uppercase tracking-wide text-[var(--muted)] mb-1.5">Judul masalah</label>
                        <input type="text" id="title" required placeholder="Printer lantai 2 macet"
                            class="w-full bg-[var(--bg)] border border-[var(--border)] rounded-md px-3 py-2.5 text-white placeholder-[var(--muted)] text-sm transition-colors">
                    </div>
                    <div>
                        <label class="mono block text-[11px] uppercase tracking-wide text-[var(--muted)] mb-1.5">Deskripsi detail</label>
                        <textarea id="description" required rows="5" placeholder="Jelaskan kendala secara detail agar sistem dapat menganalisis urgensinya..."
                            class="w-full bg-[var(--bg)] border border-[var(--border)] rounded-md px-3 py-2.5 text-white placeholder-[var(--muted)] text-sm transition-colors resize-none"></textarea>
                    </div>
                    <button type="submit" id="submitBtn" class="btn-primary w-full mono text-xs uppercase tracking-wider font-semibold py-3 rounded-md transition-all cursor-pointer">
                        submit_ticket →
                    </button>
                </form>
            </div>

            <!-- Right Column: Queue -->
            <div class="lg:col-span-2 space-y-4">
                
                <!-- Filter Panel Control -->
                <div class="bg-[var(--panel)] border border-[var(--border)] rounded-xl px-4 py-3 flex flex-wrap gap-4 items-center justify-between">
                    <div class="mono text-xs text-[var(--muted)] uppercase tracking-wider">&gt; filter_matrix</div>
                    <div class="flex gap-3">
                        <select id="filterCategory" onchange="filterMatrix()" class="mono text-[11px] bg-[var(--bg)] border border-[var(--border)] text-slate-300 rounded px-2.5 py-1.5 cursor-pointer">
                            <option value="ALL">CAT: ALL</option>
                            <option value="Network">NETWORK</option>
                            <option value="Hardware">HARDWARE</option>
                            <option value="Software">SOFTWARE</option>
                        </select>
                        <select id="filterPriority" onchange="filterMatrix()" class="mono text-[11px] bg-[var(--bg)] border border-[var(--border)] text-slate-300 rounded px-2.5 py-1.5 cursor-pointer">
                            <option value="ALL">PRIORITY: ALL</option>
                            <option value="High">HIGH</option>
                            <option value="Medium">MEDIUM</option>
                            <option value="Low">LOW</option>
                        </select>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <h2 class="mono text-sm uppercase tracking-wider text-[var(--muted)]">
                        &gt; antrean_aktif
                    </h2>
                    <span id="queueCount" class="mono text-[11px] text-[var(--muted)]"></span>
                </div>

                <div id="ticketsList" class="space-y-3 max-h-[58vh] overflow-y-auto pr-1">
                    <div class="text-[var(--muted)] mono text-sm text-center py-10 border border-dashed border-[var(--border)] rounded-xl">
                        loading tickets...
                    </div>
                </div>
            </div>

        </div>

        <!-- Footer credit -->
        <footer class="mt-10 pt-5 border-t border-[var(--border-soft)] flex justify-between items-center">
            <span class="mono text-[11px] text-[var(--muted)]">created by <span class="text-[var(--signal)]">rezi</span></span>
            <span class="mono text-[11px] text-[var(--muted)]">v2.0 // 2026</span>
        </footer>

    </div>

    <script>
        const API_URL = '/api/tickets';
        let allTicketsMemory = []; // Menyimpan salinan data dari database untuk kebutuhan filter local

        async function fetchTickets() {
            try {
                const response = await fetch(API_URL);
                allTicketsMemory = await response.json();
                filterMatrix(); // Tampilkan data awal dengan memanggil engine filter
            } catch (error) {
                console.error("Gagal mengambil data tiket:", error);
            }
        }

        // Logic Filter Matrix
        function filterMatrix() {
            const catFilter = document.getElementById('filterCategory').value;
            const priFilter = document.getElementById('filterPriority').value;
            const listContainer = document.getElementById('ticketsList');
            const countEl = document.getElementById('queueCount');

            // Menyaring data dari memori lokal berdasarkan input dropdown
            const filtered = allTicketsMemory.filter(ticket => {
                const matchCat = catFilter === 'ALL' || ticket.category === catFilter;
                const matchPri = priFilter === 'ALL' || ticket.priority === priFilter;
                return matchCat && matchPri;
            });

            countEl.textContent = filtered.length ? `${filtered.length} target(s) match` : '0 target';

            if (filtered.length === 0) {
                listContainer.innerHTML = `<div class="text-[var(--muted)] mono text-sm text-center py-10 border border-dashed border-[var(--border)] rounded-xl">tidak ada data matriks yang cocok.</div>`;
                return;
            }

            const priorityColor = {
                High: 'bg-[var(--critical)]/10 text-[var(--critical)] border-[var(--critical)]/30',
                Medium: 'bg-[var(--warning)]/10 text-[var(--warning)] border-[var(--warning)]/30',
                Low: 'bg-[var(--ok)]/10 text-[var(--ok)] border-[var(--ok)]/30'
            };
            const categoryColor = {
                Network: 'bg-blue-500/10 text-blue-400 border-blue-500/25',
                Hardware: 'bg-purple-500/10 text-purple-400 border-purple-500/25',
                default: 'bg-[var(--signal)]/10 text-[var(--signal)] border-[var(--signal)]/25'
            };

            listContainer.innerHTML = filtered.map(ticket => {
                const pColor = priorityColor[ticket.priority] || priorityColor.Low;
                const cColor = categoryColor[ticket.category] || categoryColor.default;
                const priorityClass = `priority-${ticket.priority || 'Low'}`;

                // Penentuan warna penanda status internal console
                const statusColor = 
                    ticket.status === 'Resolved' ? 'text-[var(--ok)]' :
                    ticket.status === 'In Progress' ? 'text-[var(--warning)]' : 'text-[var(--signal)]';

                return `
                    <div class="ticket-card ${priorityClass} bg-[var(--panel)] border border-[var(--border)] border-l-4 rounded-xl p-5">
                        <div class="flex flex-wrap justify-between items-start gap-2 mb-3">
                            <h3 class="text-base font-semibold text-white flex-1">${ticket.title}</h3>
                            <div class="flex gap-2 shrink-0">
                                <span class="badge text-[10px] px-2.5 py-1 rounded-full border uppercase ${cColor}">${ticket.category}</span>
                                <span class="badge text-[10px] px-2.5 py-1 rounded-full border uppercase ${pColor}">${ticket.priority}</span>
                            </div>
                        </div>
                        <p class="text-slate-300 text-sm leading-relaxed mb-4">${ticket.description}</p>
                        
                        <div class="flex flex-wrap justify-between items-center mono text-[11px] border-t border-[var(--border-soft)] pt-3 gap-3">
                            <div class="text-[var(--muted)]">status: <b class="${statusColor} uppercase tracking-wider">${ticket.status}</b></div>
                            
                            <!-- Aksi Update Status Konsol Ops -->
                            <div class="flex gap-2">
                                <button onclick="updateStatus(${ticket.id}, 'In Progress')" class="mono text-[10px] border border-[var(--border)] hover:border-[var(--warning)] hover:text-[var(--warning)] text-slate-400 px-2 py-1 rounded transition-colors cursor-pointer">
                                    // prcs
                                </button>
                                <button onclick="updateStatus(${ticket.id}, 'Resolved')" class="mono text-[10px] border border-[var(--border)] hover:border-[var(--ok)] hover:text-[var(--ok)] text-slate-400 px-2 py-1 rounded transition-colors cursor-pointer">
                                    // rslv
                                </button>
                            </div>
                            
                            <span class="text-[var(--muted)] ml-auto">${new Date(ticket.created_at).toLocaleString('id-ID')}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Logic Update Status via API
        async function updateStatus(id, newStatus) {
            try {
                const response = await fetch(`/api/tickets/${id}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                if (response.ok) {
                    fetchTickets(); // Refresh memori & antrean
                } else {
                    alert('Gagal memperbarui status operasi data.');
                }
            } catch (error) {
                console.error("Gagal melakukan update status:", error);
            }
        }

        document.getElementById('ticketForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const titleInput = document.getElementById('title');
            const descInput = document.getElementById('description');

            submitBtn.disabled = true;
            submitBtn.innerText = 'analyzing...';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: titleInput.value,
                        description: descInput.value
                    })
                });

                if (response.ok) {
                    titleInput.value = '';
                    descInput.value = '';
                    fetchTickets();
                } else {
                    alert('Gagal memproses tiket. Coba lagi.');
                }
            } catch (error) {
                console.error(error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'submit_ticket →';
            }
        });

        fetchTickets();
    </script>
</body>
</html>
